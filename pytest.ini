# pytest 配置
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步支持
asyncio_mode = auto

# 基础配置
addopts = 
    -v
    --tb=short
    --strict-markers

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    e2e: 端到端测试

# 忽略路径
norecursedirs = .git .tox build dist *.egg venv env