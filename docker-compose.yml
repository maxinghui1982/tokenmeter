version: '3.8'

services:
  tokenmeter:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///data/tokenmeter.db
      - LOG_LEVEL=INFO
      # 可选：配置 API Keys
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 监控栈
  prometheus:
    image: prom/prometheus:latest
    container_name: tokenmeter-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: tokenmeter-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/tokenmeter.json:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    profiles:
      - monitoring

  # 可选：PostgreSQL 版本（企业版）
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: tokenmeter
  #     POSTGRES_USER: tokenmeter
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  prometheus_data:
  grafana_data:
  # postgres_data:
