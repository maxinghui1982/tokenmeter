version: '3.8'

services:
  tokenmeter:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///data/tokenmeter.db
      - LOG_LEVEL=INFO
      # 可选：配置 API Keys
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选：PostgreSQL 版本（企业版）
